<section
    class="bg-[#050508] text-gray-100 antialiased font-sans selection:bg-indigo-500/30 overflow-x-hidden min-h-screen flex flex-col scroll-smooth">
    <div class="fixed inset-0 pointer-events-none z-0 opacity-50"
        style="background-image: repeating-linear-gradient(45deg, rgba(255,255,255,0.015) 0, rgba(255,255,255,0.015) 1px, transparent 1px, transparent 8px);">
    </div>

    <div class="relative w-full max-w-[1400px] mx-auto min-h-screen border-x border-white/[0.08] flex flex-col z-10">

        <!-- Inner Vertical Container Lines -->
        <div class="absolute top-0 bottom-0 left-1/3 w-[1px] bg-white/[0.04] pointer-events-none z-0 hidden md:block">
        </div>
        <div class="absolute top-0 bottom-0 right-1/3 w-[1px] bg-white/[0.04] pointer-events-none z-0 hidden md:block">
        </div>

        <!-- Frame Corner Brackets (Top Left/Right) -->
        <div class="absolute top-0 left-0 w-6 h-6 border-t border-l border-white/20 pointer-events-none"></div>
        <div class="absolute top-0 right-0 w-6 h-6 border-t border-r border-white/20 pointer-events-none"></div>
        <div class="absolute bottom-0 left-0 w-6 h-6 border-b border-l border-white/20 pointer-events-none"></div>
        <div class="absolute bottom-0 right-0 w-6 h-6 border-b border-r border-white/20 pointer-events-none"></div>

        <!-- Frame Mini Corner Squares -->
        <div class="absolute -top-[2px] -left-[2px] w-[3px] h-[3px] bg-white/40 pointer-events-none"></div>
        <div class="absolute -top-[2px] -right-[2px] w-[3px] h-[3px] bg-white/40 pointer-events-none"></div>

        <!-- Container Line Mini Corner Squares -->
        <div
            class="absolute -top-[2px] left-1/3 -ml-[1px] w-[3px] h-[3px] bg-white/40 pointer-events-none hidden md:block">
        </div>
        <div
            class="absolute -top-[2px] right-1/3 -ml-[1px] w-[3px] h-[3px] bg-white/40 pointer-events-none hidden md:block">
        </div>
        <div
            class="absolute -bottom-[2px] left-1/3 -ml-[1px] w-[3px] h-[3px] bg-white/40 pointer-events-none hidden md:block">
        </div>
        <div
            class="absolute -bottom-[2px] right-1/3 -ml-[1px] w-[3px] h-[3px] bg-white/40 pointer-events-none hidden md:block">
        </div>

        <!-- Navigation Section -->
        <header class="relative h-20 border-b border-white/[0.08] flex items-center justify-between px-8 md:px-12 z-20">
            <!-- Intersecting lines for grid feel -->
            <div class="absolute bottom-0 left-8 w-[1px] h-3 bg-white/20"></div>
            <div class="absolute bottom-0 right-8 w-[1px] h-3 bg-white/20"></div>

            <a href="#" class="flex items-center gap-2 text-sm font-medium tracking-wide uppercase group">
                <iconify-icon icon="solar:box-minimalistic-linear"
                    class="text-xl text-indigo-400 group-hover:text-indigo-300 transition-colors"
                    stroke-width="1.5"></iconify-icon>
                <span>Geo<span class="text-white/40">Form</span></span>
            </a>

            <nav class="hidden md:flex items-center gap-8 text-xs font-medium tracking-wide text-gray-400">
                <a href="#" class="hover:text-white transition-colors">Vision</a>
                <a href="#" class="hover:text-white transition-colors">Analysis</a>
                <a href="#" class="hover:text-white transition-colors">Geometry Vault</a>
            </nav>

            <button class="md:hidden text-gray-400 hover:text-white transition-colors">
                <iconify-icon icon="solar:hamburger-menu-linear" class="text-2xl" stroke-width="1.5"></iconify-icon>
            </button>
        </header>

        <!-- Hero Section -->
        <main
            class="relative flex-grow flex flex-col justify-center items-center min-h-[calc(100vh-5rem)] border-b border-white/[0.08] overflow-hidden">

            <!-- WebGL Canvas Container -->
            <div id="webgl-container" class="absolute inset-0 z-0"></div>

            <!-- Radial gradient to blend canvas edges smoothly into the dark theme -->
            <div class="absolute inset-0 pointer-events-none z-10"
                style="background: radial-gradient(circle at center, transparent 30%, #050508 100%);"></div>

            <!-- Content Overlay -->
            <div
                class="relative z-20 w-full px-8 flex flex-col items-center text-center pointer-events-none mt-20 md:mt-0">

                <!-- Structural indicator -->
                <div class="mb-8 flex flex-col items-center gap-4 opacity-0" id="reveal-badge">
                    <div class="w-[1px] h-12 bg-gradient-to-b from-transparent to-indigo-500/50"></div>
                    <span class="text-[10px] font-medium tracking-[0.2em] text-indigo-300 uppercase border border-indigo-500/20 px-3 py-1 rounded-full bg-indigo-500/5 backdrop-blur-sm">
                        Form Detected
                    </span>
                </div>

                <!-- Masked Reveal Heading -->
                <h1 class="text-5xl md:text-7xl lg:text-[6rem] tracking-tight font-normal leading-[1.05] text-white">
                    <div class="inline-block overflow-hidden"
                        style="clip-path: polygon(0 0, 100% 0, 100% 100%, 0% 100%);">
                        <span class="reveal-text block translate-y-[110%] will-change-transform">Synthesize</span>
                    </div>
                    <br>
                    <div class="inline-block overflow-hidden"
                        style="clip-path: polygon(0 0, 100% 0, 100% 100%, 0% 100%);">
                        <span class="reveal-text block translate-y-[110%] will-change-transform text-transparent bg-clip-text bg-gradient-to-r from-indigo-300 via-purple-300 to-indigo-500">
                            The Unknown
                        </span>
                    </div>
                </h1>

                <!-- Masked Reveal Paragraph -->
                <div class="mt-8 max-w-lg mx-auto overflow-hidden"
                    style="clip-path: polygon(0 0, 100% 0, 100% 100%, 0% 100%);">
                    <p
                        class="reveal-text block translate-y-[110%] text-sm md:text-base font-normal text-gray-400 leading-relaxed will-change-transform">
                        Analyze crystalline structures through physically-based light rendering. We map the vertices of
                        generated forms using high-fidelity WebGL geometry.
                    </p>
                </div>

                <!-- Call to Action (Pointer events auto to be clickable) -->
                <div class="mt-12 pointer-events-auto opacity-0" id="reveal-cta">
                    <button class="group relative px-6 py-3 text-xs font-medium tracking-wide uppercase bg-white/5 border border-white/10 hover:bg-white/10 transition-all duration-300 flex items-center gap-3 overflow-hidden">
                        <span class="relative z-10">Begin Synthesis</span>
                        <iconify-icon icon="solar:arrow-right-linear" class="text-base relative z-10 group-hover:translate-x-1 transition-transform" stroke-width="1.5"></iconify-icon>
                        <!-- Hover effect background -->
                        <div class="absolute inset-0 bg-gradient-to-r from-indigo-600/20 to-purple-600/20 translate-y-full group-hover:translate-y-0 transition-transform duration-300 ease-out z-0"></div>
                    </button>
                </div>
            </div>

            <!-- Vertical measurement lines for aesthetic -->
            <div
                class="absolute top-1/2 -translate-y-1/2 left-0 w-[1px] h-32 bg-white/10 flex flex-col justify-between items-center py-1 z-10 hidden lg:flex">
                <div class="w-[3px] h-[1px] bg-white/40"></div>
                <div class="w-[3px] h-[1px] bg-white/40"></div>
            </div>
            <div
                class="absolute top-1/2 -translate-y-1/2 right-0 w-[1px] h-32 bg-white/10 flex flex-col justify-between items-center py-1 z-10 hidden lg:flex">
                <div class="w-[3px] h-[1px] bg-white/40"></div>
                <div class="w-[3px] h-[1px] bg-white/40"></div>
            </div>

        </main>
    </div>

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://code.iconify.design/iconify-icon/1.0.7/iconify-icon.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
    <script>
        // --- GSAP Animations ---
        gsap.registerPlugin(ScrollTrigger);

        document.addEventListener("DOMContentLoaded", () => {
            const tl = gsap.timeline({
                scrollTrigger: {
                    trigger: "main",
                    start: "top 60%",
                },
                defaults: { ease: "power4.out" }
            });

            tl.to(".reveal-text", {
                y: "0%",
                duration: 1.2,
                stagger: 0.15,
                delay: 0.2
            })
            .to("#reveal-badge", {
                opacity: 1,
                y: 0,
                duration: 1,
                clearProps: "all"
            }, "-=0.8")
            .to("#reveal-cta", {
                opacity: 1,
                y: 0,
                duration: 1,
                clearProps: "all"
            }, "-=0.6");
        });

        // --- Three.js WebGL Setup ---
        const container = document.getElementById('webgl-container');
        
        // Scene Setup
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.z = 4;

        const renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        container.appendChild(renderer.domElement);

        // Geometric Mesh (Faceted)
        const geometry = new THREE.IcosahedronGeometry(1.3, 0);
        
        // Physically-Based Material
        const material = new THREE.MeshStandardMaterial({
            color: 0x8b5cf6, // Violet base
            metalness: 0.85,
            roughness: 0.2,
            emissive: 0x1e1b4b, // Deep space glow
            emissiveIntensity: 0.6,
            flatShading: true // Gives the faceted look
        });
        
        const mesh = new THREE.Mesh(geometry, material);
        scene.add(mesh);

        // Real Lighting Setup
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.3);
        scene.add(ambientLight);

        const dirLight = new THREE.DirectionalLight(0xffffff, 2);
        dirLight.position.set(5, 5, 5);
        scene.add(dirLight);

        const backLight = new THREE.DirectionalLight(0xa855f7, 3);
        backLight.position.set(-5, -5, -2);
        scene.add(backLight);

        const pointLight = new THREE.PointLight(0x4f46e5, 5, 10);
        pointLight.position.set(0, 2, 2);
        scene.add(pointLight);

        // Mouse Interaction for Hover Effect
        let targetMouse = new THREE.Vector2(0, 0);
        let currentMouse = new THREE.Vector2(0, 0);
        
        window.addEventListener('mousemove', (event) => {
            targetMouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            targetMouse.y = -(event.clientY / window.innerHeight) * 2 + 1;
        });

        // Handle Resize
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // Animation Loop
        const clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);
            
            const elapsedTime = clock.getElapsedTime();

            // Smoothly interpolate current mouse to target mouse
            currentMouse.x += (targetMouse.x - currentMouse.x) * 0.05;
            currentMouse.y += (targetMouse.y - currentMouse.y) * 0.05;

            // Rotation & Floating Motion
            mesh.rotation.x = elapsedTime * 0.2 + currentMouse.y * 0.4;
            mesh.rotation.y = elapsedTime * 0.3 + currentMouse.x * 0.4;
            mesh.position.y = Math.sin(elapsedTime * 1.5) * 0.12;
            mesh.position.x = currentMouse.x * 0.15;

            renderer.render(scene, camera);
        }

        animate();
    </script>
</section>
