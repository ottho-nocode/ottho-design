<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Synthex - Cognitive Platform</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://code.iconify.design/iconify-icon/1.0.7/iconify-icon.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
</head>

<body class="bg-[#030303] text-white overflow-hidden min-h-screen relative selection:bg-blue-500/30"
  style="font-family: 'Inter', sans-serif;">

  <!-- Dynamic Animated Background Container -->
  <div class="absolute inset-0 z-0 flex items-end justify-center px-2 md:px-8 pb-0 gap-0" id="bg-container">
    <!-- Bars injected via JS -->
  </div>

  <!-- Foreground UI -->
  <div class="relative z-10 flex flex-col min-h-screen">

    <!-- Header Navigation -->
    <header class="w-full flex justify-center pt-6 px-4">
      <nav
        class="bg-[#18181b]/70 backdrop-blur-xl border border-white/5 rounded-full px-5 py-2.5 flex items-center justify-between w-full max-w-2xl shadow-2xl">
        <!-- Logo -->
        <div class="flex items-center gap-3 cursor-pointer group">
          <div
            class="w-7 h-7 rounded-full bg-gradient-to-tr from-[#2563eb] to-[#60a5fa] flex items-center justify-center shadow-inner group-hover:scale-105 transition-transform duration-300">

          </div>
          <span class="text-gray-200 text-sm font-medium tracking-wide">Synthex</span>
        </div>

        <!-- Links -->
        <div class="flex items-center gap-6">
          <a href="#"
            class="text-xs font-medium text-[#888888] hover:text-white transition-colors duration-200">Company</a>
          <a href="#"
            class="text-xs font-medium text-[#888888] hover:text-white transition-colors duration-200">Upgrades</a>
          <a href="#"
            class="text-xs font-medium text-[#888888] hover:text-white transition-colors duration-200">Access</a>
        </div>
      </nav>
    </header>

    <!-- Hero Section -->
    <main class="flex-1 flex flex-col items-center justify-center px-4 pb-32 text-center">

      <!-- Animated Badge -->
      <div class="mb-7 relative group cursor-pointer">
        <!-- Glow Effect -->
        <div
          class="absolute inset-0 bg-[#3b82f6] blur-2xl rounded-full opacity-40 group-hover:opacity-70 group-hover:scale-110 transition-all duration-700">
        </div>
        <!-- Core Badge -->

      </div>

      <!-- Typography -->
      <h1 class="text-4xl md:text-5xl lg:text-6xl font-semibold tracking-tight text-white mb-5 max-w-4xl">
        Systems That Think Ahead.
      </h1>

      <p class="text-sm md:text-base text-gray-400 max-w-[540px] leading-relaxed mb-9">
        Design, build, and optimize workflows using an intelligence that maps your processes and improves with every
        action.
      </p>

      <!-- Actions -->
      <div class="flex flex-col sm:flex-row items-center gap-4">
        <button class="w-full sm:w-auto px-7 py-3 bg-white text-black text-sm font-medium rounded-full shadow-[0_0_24px_rgba(255,255,255,0.25)] hover:shadow-[0_0_35px_rgba(255,255,255,0.45)] hover:scale-[1.02] transition-all duration-300">
                    Launch Now
                </button>
        <button class="w-full sm:w-auto px-7 py-3 bg-black/40 backdrop-blur-md border border-white/10 text-white text-sm font-medium rounded-full hover:bg-white/10 hover:border-white/20 transition-all duration-300">
                    Play Video
                </button>
      </div>
    </main>
  </div>

  <!-- Background Generation & Animation Logic -->
  <script>
    document.addEventListener("DOMContentLoaded", () => {
            const container = document.getElementById('bg-container');
            const numBars = 23; // Defines the resolution of the stepped gradient
            const bars = [];
            const centerIndex = Math.floor(numBars / 2);

            // Generate DOM elements for the stepped background
            for (let i = 0; i < numBars; i++) {
                const bar = document.createElement('div');
                bar.className = 'flex-1 h-full w-full opacity-90 transition-transform origin-bottom';

                // Calculate V-shape geometry based on distance from center
                const dist = Math.abs(i - centerIndex);
                const normDist = dist / centerIndex;
                
                // Base height curve (lowest in center, highest at edges)
                const baseHeight = 22 + Math.pow(normDist, 1.4) * 68;

                // Apply inline styles to avoid <style> tags
                bar.style.height = `${baseHeight}%`;
                
                // Reconstruct the complex neon gradient with the new clean blue palette
                bar.style.background = 'linear-gradient(to top, #020617 0%, #1e3a8a 22%, #ffffff 42%, #3b82f6 65%, transparent 95%)';
                
                // Subtle separation lines to define the steps
                bar.style.borderRight = '1px solid rgba(0,0,0,0.4)';
                bar.style.borderLeft = '1px solid rgba(0,0,0,0.4)';

                container.appendChild(bar);
                bars.push({ el: bar, baseHeight: baseHeight, index: i });
            }

            // Animation Loop for breathing and pulsing effect
            let start = Date.now();
            function animateBackground() {
                const now = Date.now();
                const time = (now - start) * 0.001; // elapsed time in seconds

                bars.forEach(b => {
                    // Create a fluid vertical wave motion
                    const wave = Math.sin(time * 1.2 + (b.index * 0.25)) * 2;
                    b.el.style.height = `${b.baseHeight + wave}%`;

                    // Subtle pulsing of opacity to simulate glowing light
                    const pulse = Math.sin(time * 1.5 + (b.index * 0.15)) * 0.05;
                    b.el.style.opacity = 0.9 + pulse;
                });
                
                requestAnimationFrame(animateBackground);
            }
            
            // Initiate animation
            animateBackground();
        });
  </script>
</body>

</html>
