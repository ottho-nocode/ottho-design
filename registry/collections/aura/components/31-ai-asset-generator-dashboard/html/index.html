    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://code.iconify.design/iconify-icon/1.0.7/iconify-icon.min.js"></script>
    <script>
        // Interactive Dropzone Glow
        const dropzone = document.getElementById('dropzone');
        const glow = document.getElementById('dropzone-glow');
        
        if(dropzone && glow) {
            dropzone.addEventListener('mousemove', (e) => {
                const rect = dropzone.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;
                glow.style.left = `${x}px`;
                glow.style.top = `${y}px`;
            });
        }

        // Infinite Cascading Gallery Animation
        window.addEventListener('load', () => {
            const columns = [
                { id: 'col-1', speed: 0.25 }, // Scrolls visually down (pos increases negative)
                { id: 'col-2', speed: -0.25 }, // Scrolls visually up (pos decreases)
                { id: 'col-3', speed: 0.3 }  // Scrolls visually down
            ];

            columns.forEach(colData => {
                const el = document.getElementById(colData.id);
                if (!el) return;

                // Clone inner content to create seamless loop
                el.innerHTML += el.innerHTML;

                let pos = 0;
                
                // Wait for layout calculation
                setTimeout(() => {
                    const halfHeight = el.scrollHeight / 2;

                    // Initialize start positions
                    if (colData.speed > 0) {
                        pos = -halfHeight; // Start offset so it can scroll towards 0
                    }

                    function animate() {
                        pos += colData.speed;

                        if (colData.speed < 0) {
                            // Moving UP
                            if (pos <= -halfHeight) pos = 0;
                        } else {
                            // Moving DOWN
                            if (pos >= 0) pos = -halfHeight;
                        }

                        el.style.transform = `translate3d(0, ${pos}px, 0)`;
                        requestAnimationFrame(animate);
                    }

                    requestAnimationFrame(animate);
                }, 100);
            });
        });
    </script>
