<section
  class="bg-[#030303] text-gray-100 font-sans antialiased min-h-screen flex flex-col relative overflow-hidden selection:bg-orange-500/30 font-['Inter',sans-serif]"
  style="font-family: 'Inter', sans-serif;">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&amp;display=swap" rel="stylesheet">
  <style>
    @keyframes spin-slow {
      from {
        transform: rotate(0deg);
      }

      to {
        transform: rotate(360deg);
      }
    }

    @keyframes spin-slow-reverse {
      from {
        transform: rotate(360deg);
      }

      to {
        transform: rotate(0deg);
      }
    }

    @keyframes spin-hand-blue {
      from {
        transform: rotate(-35deg);
      }

      to {
        transform: rotate(325deg);
      }
    }

    @keyframes spin-hand-orange {
      from {
        transform: rotate(65deg);
      }

      to {
        transform: rotate(425deg);
      }
    }

    .animate-spin-slow {
      animation: spin-slow 40s linear infinite;
    }

    .animate-spin-slower-reverse {
      animation: spin-slow-reverse 60s linear infinite;
    }

    .animate-spin-blue {
      animation: spin-hand-blue 16s linear infinite;
    }

    .animate-spin-orange {
      animation: spin-hand-orange 28s linear infinite;
    }
  </style>

  <!-- Background Atmospheric Effects -->
  <div class="fixed inset-0 pointer-events-none overflow-hidden z-0">
    <div class="absolute inset-0"
      style="background: radial-gradient(ellipse at center, rgba(255,255,255,0.02) 0%, transparent 100%);"></div>

    <!-- Light Beams -->
    <div class="absolute top-[5%] -left-[10%] w-[120%] h-[30%] rotate-[-15deg] origin-left">
      <div
        class="absolute inset-0 bg-gradient-to-r from-orange-600/30 via-orange-500/5 to-transparent blur-[60px] mix-blend-screen">
      </div>
      <div class="absolute inset-0 opacity-40 mix-blend-color-dodge blur-[2px]"
        style="background-image: radial-gradient(rgba(249,115,22,0.6) 1px, transparent 1px); background-size: 4px 4px; mask-image: linear-gradient(to right, black 5%, transparent 40%); -webkit-mask-image: linear-gradient(to right, black 5%, transparent 40%);">
      </div>
    </div>

    <div class="absolute bottom-[10%] -right-[10%] w-[120%] h-[30%] rotate-[-15deg] origin-right">
      <div
        class="absolute inset-0 bg-gradient-to-l from-blue-600/30 via-blue-500/5 to-transparent blur-[60px] mix-blend-screen">
      </div>
      <div class="absolute inset-0 opacity-30 mix-blend-color-dodge blur-[2px]"
        style="background-image: radial-gradient(rgba(37,99,235,0.6) 1px, transparent 1px); background-size: 4px 4px; mask-image: linear-gradient(to left, black 5%, transparent 40%); -webkit-mask-image: linear-gradient(to left, black 5%, transparent 40%);">
      </div>
    </div>
  </div>

  <!-- Main Hero Content -->
  <main class="flex-grow relative z-10 w-full max-w-7xl mx-auto px-6 lg:px-12 flex items-center pt-24 pb-16 lg:py-0">
    <div class="w-full grid grid-cols-1 lg:grid-cols-2 gap-16 lg:gap-12 items-center">

      <!-- Kinetic Spinner Device -->
      <div
        class="relative w-full max-w-[500px] aspect-square mx-auto lg:mx-0 group flex items-center justify-center cursor-pointer">
        <div
          class="absolute inset-0 bg-gradient-to-tr from-blue-600/20 to-orange-500/20 rounded-full blur-[80px] group-hover:blur-[100px] opacity-0 group-hover:opacity-100 transition-all duration-700 ease-out scale-90 group-hover:scale-105">
        </div>

        <div
          class="relative w-full h-full rounded-full bg-gradient-to-b from-[#2a2a2e] to-[#0a0a0c] p-[3px] shadow-[0_20px_60px_rgba(0,0,0,0.8),inset_0_2px_4px_rgba(255,255,255,0.15)] group-hover:scale-[1.02] group-hover:rotate-[30deg] transition-all duration-1000 ease-[cubic-bezier(0.2,0.8,0.2,1)] z-10">
          <div
            class="w-full h-full rounded-full bg-[#0a0a0c] relative overflow-hidden shadow-[inset_0_15px_40px_rgba(0,0,0,0.9)] border border-white/5 flex items-center justify-center">
            <div class="absolute inset-0 opacity-[0.15]"
              style="background-image: radial-gradient(#ffffff 1px, transparent 1px); background-size: 4px 4px;"></div>

            <!-- Core Layers -->
            <div
              class="absolute -left-1/4 top-1/4 w-1/2 h-1/2 bg-blue-600/30 blur-[40px] rounded-full mix-blend-screen">
            </div>
            <div
              class="absolute -right-1/4 top-1/4 w-1/2 h-1/2 bg-red-500/20 blur-[40px] rounded-full mix-blend-screen">
            </div>
            <div
              class="absolute w-[88%] h-[88%] rounded-full border border-white/5 shadow-[inset_0_0_15px_rgba(0,0,0,0.5)] animate-spin-slow">
            </div>
            <div class="absolute w-[76%] h-[76%] rounded-full border border-dashed border-white/10 opacity-60"></div>
            <div
              class="absolute w-[60%] h-[60%] rounded-full border border-white/5 shadow-[0_0_20px_rgba(0,0,0,0.5)] animate-spin-slower-reverse">
            </div>

            <!-- Marking Indicators -->
            <div
              class="absolute inset-0 w-full h-full pointer-events-none text-[10px] uppercase tracking-tighter opacity-60">
              <span class="absolute top-[8%] left-1/2 -translate-x-1/2 text-gray-500">12</span>
              <span class="absolute bottom-[8%] left-1/2 -translate-x-1/2 text-gray-600">06</span>
              <span class="absolute left-[8%] top-1/2 -translate-y-1/2 text-gray-600">09</span>
              <span class="absolute right-[8%] top-1/2 -translate-y-1/2 text-gray-500">03</span>
            </div>

            <!-- Blue Telemetry Hand -->
            <div class="absolute inset-0 z-20 animate-spin-blue">
              <div
                class="absolute top-1/2 left-1/2 w-[70%] h-[70%] -translate-x-1/2 -translate-y-1/2 rounded-full mix-blend-screen pointer-events-none opacity-90"
                style="background: conic-gradient(from 0deg at 50% 50%, transparent 60%, rgba(59,130,246,0.1) 80%, rgba(59,130,246,0.5) 100%); mask-image: radial-gradient(circle, transparent 15%, black 60%, transparent 100%); -webkit-mask-image: radial-gradient(circle, transparent 15%, black 60%, transparent 100%);">
              </div>
              <div
                class="absolute w-[2px] h-[35%] bg-gradient-to-t from-transparent via-blue-500 to-blue-200 bottom-1/2 left-[calc(50%-1px)] origin-bottom shadow-[0_0_20px_rgba(59,130,246,1)] rounded-full">
              </div>
            </div>

            <!-- Orange Navigation Hand -->
            <div class="absolute inset-0 z-20 animate-spin-orange">
              <div
                class="absolute top-1/2 left-1/2 w-[80%] h-[80%] -translate-x-1/2 -translate-y-1/2 rounded-full mix-blend-screen pointer-events-none opacity-90"
                style="background: conic-gradient(from 0deg at 50% 50%, transparent 65%, rgba(249,115,22,0.08) 85%, rgba(249,115,22,0.5) 100%); mask-image: radial-gradient(circle, transparent 20%, black 65%, transparent 100%); -webkit-mask-image: radial-gradient(circle, transparent 20%, black 65%, transparent 100%);">
              </div>
              <div
                class="absolute w-[2px] h-[40%] bg-gradient-to-t from-transparent via-orange-500 to-white bottom-1/2 left-[calc(50%-1px)] origin-bottom shadow-[0_0_25px_rgba(249,115,22,1)] rounded-full">
              </div>
            </div>

            <!-- Center Hub Detail -->
            <div class="absolute w-28 h-28 z-30 flex items-center justify-center">
              <div class="absolute inset-0 bg-black/60 blur-md rounded-2xl transform translate-y-2"></div>
              <div
                class="relative w-24 h-24 bg-gradient-to-br from-[#1e1e24] to-[#0c0c0e] rounded-[20px] shadow-[inset_0_1px_1px_rgba(255,255,255,0.1),0_10px_20px_rgba(0,0,0,0.5)] border border-white/5 flex flex-wrap gap-1 p-2 items-center justify-center group-hover:shadow-[0_15px_30px_rgba(0,0,0,0.8)] transition-all duration-700">
                <div
                  class="w-[45%] h-[45%] bg-[#080809] rounded-lg shadow-[inset_0_2px_5px_rgba(0,0,0,0.8)] border-t border-l border-white/5">
                </div>
                <div
                  class="w-[45%] h-[45%] bg-[#080809] rounded-lg shadow-[inset_0_2px_5px_rgba(0,0,0,0.8)] border-t border-r border-white/5">
                </div>
                <div
                  class="w-[45%] h-[45%] bg-[#080809] rounded-lg shadow-[inset_0_2px_5px_rgba(0,0,0,0.8)] border-b border-l border-white/5">
                </div>
                <div
                  class="w-[45%] h-[45%] bg-[#080809] rounded-lg shadow-[inset_0_2px_5px_rgba(0,0,0,0.8)] border-b border-r border-white/5">
                </div>
                <div
                  class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-3 h-3 bg-gradient-to-br from-gray-400 to-gray-700 rounded-full border border-white/20 z-40">
                </div>
              </div>
            </div>
            <div
              class="absolute inset-0 rounded-full bg-gradient-to-tr from-white/[0.03] to-transparent opacity-50 z-40 pointer-events-none">
            </div>
          </div>
          <div
            class="absolute top-1/2 -right-[14px] -translate-y-1/2 w-3.5 h-10 bg-gradient-to-r from-[#2a2a2e] to-[#151518] rounded-r-md shadow-lg border-y border-r border-white/10 z-0"
            style="background-image: repeating-linear-gradient(to bottom, transparent, transparent 2px, black 2px, black 3px);">
          </div>
        </div>
      </div>

      <!-- Content Section -->
      <div class="flex flex-col z-10 lg:pl-10">
        <h1 class="text-6xl lg:text-8xl font-light tracking-tight leading-[1.0] mb-6 text-white">
          Precision in<br>
          <span class="font-normal">Motion</span>
        </h1>

        <p class="text-lg text-gray-400 mb-10 max-w-md font-light leading-relaxed">
          Harness the exactitude of advanced telemetry. The definitive instrument designed for visionary teams to
          navigate complex systems flawlessly.
        </p>

        <div class="flex flex-wrap items-center gap-5">
          <div class="relative group/btn cursor-pointer w-full sm:w-auto">
            <div
              class="absolute -inset-1 bg-gradient-to-r from-orange-600 to-amber-400 rounded-full blur-md opacity-60 group-hover/btn:opacity-100 transition-opacity">
            </div>
            <button class="relative w-full bg-white text-black px-10 py-4 rounded-full font-medium text-sm shadow-xl transition-transform active:scale-95">
                            ENGAGE TRACKING
                        </button>
          </div>

          <button class="group/sec relative px-10 py-4 rounded-full bg-white/[0.04] border border-white/10 backdrop-blur-xl text-sm font-medium text-white hover:bg-white/[0.08] transition-all flex items-center justify-center gap-3 overflow-hidden">
                        <iconify-icon icon="solar:programming-linear" class="text-xl"></iconify-icon>
                        VIEW TELEMETRY
                        <div class="absolute inset-0 bg-gradient-to-r from-transparent via-white/5 to-transparent -translate-x-full group-hover/sec:translate-x-full transition-transform duration-700"></div>
                    </button>
        </div>
      </div>
    </div>
  </main>

  <!-- Footer -->
  <footer class="w-full relative z-10 border-t border-white/[0.06] mt-auto bg-black/40 backdrop-blur-md">
    <div
      class="max-w-7xl mx-auto px-6 lg:px-12 py-8 flex flex-col md:flex-row items-center justify-between gap-6 text-[11px] text-gray-500 uppercase tracking-widest font-light">
      <div class="flex items-center">
        <span>© 2026 AeroNav Systems. Precision Core.</span>
      </div>

      <div class="flex items-center gap-6">
        <a href="#" class="hover:text-white transition-colors">Twitter</a>
        <a href="#" class="hover:text-white transition-colors">LinkedIn</a>
        <a href="#" class="hover:text-white transition-colors">GitHub</a>
      </div>

      <div class="flex items-center gap-2 group cursor-pointer">
        <iconify-icon icon="solar:heart-angle-linear"
          class="text-orange-500 text-lg group-hover:scale-125 transition-transform"></iconify-icon>
        <span class="group-hover:text-gray-300">Calibrated for excellence</span>
      </div>
    </div>
  </footer>

  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://code.iconify.design/iconify-icon/1.0.7/iconify-icon.min.js"></script>
</section>
