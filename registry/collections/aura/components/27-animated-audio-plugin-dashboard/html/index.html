<section
  class="bg-[#030303] text-neutral-300 font-sans antialiased min-h-screen flex items-center justify-center p-4 sm:p-8 selection:bg-blue-500/30 overflow-x-hidden">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&amp;display=swap" rel="stylesheet">

  <div
    class="fixed top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[800px] h-[800px] bg-blue-500/5 rounded-full blur-[120px] pointer-events-none z-0">
  </div>

  <div id="app-container"
    class="relative z-10 w-full max-w-[1024px] rounded-2xl border border-white/5 bg-[#0a0a0a] shadow-[0_24px_80px_rgba(0,0,0,0.8)] flex flex-col overflow-hidden opacity-0 translate-y-8">

    <!-- Header / Navigation bar -->
    <header
      class="flex flex-col sm:flex-row items-start sm:items-center justify-between p-5 border-b border-white/5 gap-4 bg-[#050505]">
      <div class="flex items-center gap-5">
        <!-- Power Toggle -->
        <button class="w-10 h-10 rounded-lg bg-white/5 border border-white/10 flex items-center justify-center hover:bg-white/10 transition-colors group">
                    <iconify-icon icon="solar:power-linear" class="text-blue-500 text-lg drop-shadow-[0_0_8px_rgba(59,130,246,0.6)] group-hover:drop-shadow-[0_0_12px_rgba(59,130,246,1)] transition-all" style="stroke-width: 1.5;"></iconify-icon>
                </button>

        <div class="flex flex-col">
          <h1 class="text-xl font-normal tracking-tight text-neutral-100">Aura</h1>
          <span class="text-xs tracking-[0.2em] text-neutral-500 font-light mt-0.5 uppercase">Saturation Engine</span>
        </div>
      </div>

      <!-- Central Presets -->
      <div
        class="flex items-center gap-3 px-4 py-2 rounded-lg border border-white/5 bg-white/5 cursor-pointer hover:bg-white/10 transition-colors group">
        <div class="w-2 h-2 rounded-full bg-blue-500 shadow-[0_0_8px_rgba(59,130,246,0.8)] relative">
          <div class="absolute inset-0 rounded-full bg-blue-400 animate-ping opacity-20"></div>
        </div>
        <span class="text-sm font-light text-neutral-200">Vintage Magnetic Tape</span>
        <iconify-icon icon="solar:alt-arrow-down-linear" class="text-neutral-500 group-hover:text-neutral-300 ml-2"
          style="stroke-width: 1.5;"></iconify-icon>
      </div>

      <!-- History Actions -->
      <div class="flex items-center gap-2">
        <button class="w-8 h-8 rounded-md flex items-center justify-center text-neutral-500 hover:text-neutral-200 hover:bg-white/5 transition-colors">
                    <iconify-icon icon="solar:undo-left-linear" class="text-lg" style="stroke-width: 1.5;"></iconify-icon>
                </button>
        <button class="w-8 h-8 rounded-md flex items-center justify-center text-neutral-500 hover:text-neutral-200 hover:bg-white/5 transition-colors">
                    <iconify-icon icon="solar:undo-right-linear" class="text-lg" style="stroke-width: 1.5;"></iconify-icon>
                </button>
      </div>
    </header>

    <!-- Main Workspace Grid -->
    <div class="grid grid-cols-1 lg:grid-cols-12 gap-px bg-white/5 p-px">

      <!-- Left Column: Dynamics -->
      <div class="lg:col-span-3 bg-[#0a0a0a] p-8 flex flex-col justify-center gap-12 panel-section relative">
        <div class="absolute top-4 left-4 flex items-center gap-2 opacity-50">
          <iconify-icon icon="solar:slider-vertical-linear" class="text-sm"></iconify-icon>
          <span class="text-xs tracking-widest font-light uppercase">Dynamics</span>
        </div>

        <!-- Density Fader -->
        <div class="flex flex-col gap-4 mt-6">
          <div class="flex justify-between items-end">
            <span class="text-sm font-light text-neutral-400">Density</span>
            <span class="text-sm font-normal text-white flex items-baseline gap-0.5"><span class="anim-val" data-val="45">0</span><span class="text-xs text-neutral-600">%</span></span>
          </div>
          <div class="h-1.5 w-full bg-neutral-900 rounded-full overflow-hidden border border-white/5 relative">
            <div
              class="absolute top-0 left-0 h-full bg-gradient-to-r from-blue-600 to-blue-400 rounded-full w-0 anim-bar origin-left"
              data-w="45"></div>
          </div>
        </div>

        <!-- Drive Fader -->
        <div class="flex flex-col gap-4">
          <div class="flex justify-between items-end">
            <span class="text-sm font-light text-neutral-400">Drive</span>
            <span class="text-sm font-normal text-white flex items-baseline gap-0.5"><span class="anim-val" data-val="88">0</span><span class="text-xs text-neutral-600">%</span></span>
          </div>
          <div class="h-1.5 w-full bg-neutral-900 rounded-full overflow-hidden border border-white/5 relative">
            <div
              class="absolute top-0 left-0 h-full bg-gradient-to-r from-blue-600 to-blue-400 rounded-full w-0 anim-bar origin-left"
              data-w="88"></div>
          </div>
        </div>
      </div>

      <!-- Center Column: Core Visualizer -->
      <div
        class="lg:col-span-6 bg-gradient-to-b from-[#0c0c0c] to-[#050505] p-10 flex flex-col items-center justify-center min-h-[400px] panel-section relative overflow-hidden">
        <!-- Data Ring Container -->
        <div class="relative w-64 h-64 flex items-center justify-center">

          <!-- SVG Dial -->
          <!-- Radius 110, Circumference ≈ 691 -->
          <svg class="absolute inset-0 w-full h-full -rotate-90 drop-shadow-[0_0_12px_rgba(59,130,246,0.3)]"
            viewBox="0 0 240 240">
            <circle cx="120" cy="120" r="110" fill="none" stroke="rgba(255,255,255,0.05)" stroke-width="2"></circle>
            <circle cx="120" cy="120" r="110" fill="none" stroke="rgba(255,255,255,0.02)" stroke-width="12"
              stroke-dasharray="2 4"></circle>
            <circle id="main-ring" cx="120" cy="120" r="110" fill="none" stroke="#3b82f6" stroke-width="4"
              stroke-linecap="round" stroke-dasharray="691" stroke-dashoffset="691" data-target="221"
              class="transition-all duration-300 ease-out"></circle>
          </svg>

          <!-- Center Readout -->
          <div class="flex flex-col items-center justify-center z-10 relative">
            <span class="text-xs tracking-[0.2em] text-blue-400 font-light mb-2">SATURATION</span>
            <div class="flex items-start">
              <span class="text-6xl tracking-tight font-light text-white anim-val" data-val="68">0</span>
              <span class="text-2xl font-light text-neutral-600 mt-1 ml-1">%</span>
            </div>
          </div>

          <!-- Decorative Orbit Dot -->
          <div class="absolute w-full h-full animate-[spin_20s_linear_infinite]">
            <div
              class="w-1.5 h-1.5 bg-blue-500 rounded-full absolute top-[-3px] left-1/2 -translate-x-1/2 shadow-[0_0_10px_#3b82f6]">
            </div>
          </div>
        </div>
      </div>

      <!-- Right Column: Textural Degration -->
      <div class="lg:col-span-3 bg-[#0a0a0a] p-8 flex flex-col justify-center gap-10 panel-section relative">
        <div class="absolute top-4 right-4 flex items-center gap-2 opacity-50 flex-row-reverse">
          <iconify-icon icon="solar:soundwave-linear" class="text-sm"></iconify-icon>
          <span class="text-xs tracking-widest font-light uppercase">Texture</span>
        </div>

        <!-- Wow & Flutter -->
        <div class="mt-6 flex flex-col gap-3">
          <div class="flex justify-between">
            <span class="text-xs font-light tracking-wide text-neutral-500">WOW &amp; FLUTTER</span>
            <span class="text-xs font-normal text-white anim-val" data-val="24">0</span>
          </div>
          <div class="h-[3px] bg-neutral-900 w-full relative group cursor-pointer">
            <div class="absolute top-0 left-0 h-full bg-neutral-600 w-0 anim-bar" data-w="24"></div>
            <div
              class="absolute top-1/2 -translate-y-1/2 w-2.5 h-2.5 bg-white rounded-full shadow-[0_0_5px_rgba(255,255,255,0.5)] anim-thumb"
              data-left="24%"></div>
          </div>
        </div>

        <!-- Degrade -->
        <div class="flex flex-col gap-3">
          <div class="flex justify-between">
            <span class="text-xs font-light tracking-wide text-neutral-500">DEGRADE</span>
            <span class="text-xs font-normal text-white anim-val" data-val="12">0</span>
          </div>
          <div class="h-[3px] bg-neutral-900 w-full relative group cursor-pointer">
            <div class="absolute top-0 left-0 h-full bg-neutral-600 w-0 anim-bar" data-w="12"></div>
            <div
              class="absolute top-1/2 -translate-y-1/2 w-2.5 h-2.5 bg-white rounded-full shadow-[0_0_5px_rgba(255,255,255,0.5)] anim-thumb"
              data-left="12%"></div>
          </div>
        </div>

        <!-- Noise Floor -->
        <div class="flex flex-col gap-3">
          <div class="flex justify-between">
            <span class="text-xs font-light tracking-wide text-neutral-500">NOISE FLOOR</span>
            <span class="text-xs font-normal text-white anim-val" data-val="8">0</span>
          </div>
          <div class="h-[3px] bg-neutral-900 w-full relative group cursor-pointer">
            <div class="absolute top-0 left-0 h-full bg-neutral-600 w-0 anim-bar" data-w="8"></div>
            <div
              class="absolute top-1/2 -translate-y-1/2 w-2.5 h-2.5 bg-white rounded-full shadow-[0_0_5px_rgba(255,255,255,0.5)] anim-thumb"
              data-left="8%"></div>
          </div>
        </div>
      </div>
    </div>

    <!-- Footer / Blend Output -->
    <div
      class="bg-[#050505] p-6 border-t border-white/5 flex flex-col sm:flex-row items-center justify-between gap-6 panel-section relative z-20">
      <div class="flex items-center gap-3 min-w-[120px]">
        <iconify-icon icon="solar:slider-horizontal-linear" class="text-neutral-500 text-lg"></iconify-icon>
        <span class="text-xs tracking-[0.15em] text-neutral-400 font-light uppercase">Blend Ratio</span>
      </div>

      <div class="flex-1 w-full flex items-center gap-4">
        <span class="text-xs tracking-widest text-neutral-600 font-normal">DIRECT</span>

        <div class="flex-1 relative h-8 flex items-center group cursor-pointer">
          <!-- Track -->
          <div class="absolute w-full h-1 bg-neutral-900 rounded-full border border-white/5 overflow-hidden">
            <div class="absolute top-0 left-0 h-full bg-blue-500/20 w-0 anim-bar" data-w="85"></div>
          </div>
          <!-- Target Node -->
          <div
            class="absolute top-1/2 -translate-y-1/2 -translate-x-1/2 w-1 h-3 bg-white/20 rounded-full left-1/2 pointer-events-none">
          </div>
          <!-- Draggable Handle -->
          <div
            class="absolute top-1/2 -translate-y-1/2 w-5 h-5 bg-[#1a1a1a] rounded-full border border-white/20 shadow-[0_2px_10px_rgba(0,0,0,0.5)] flex items-center justify-center anim-thumb z-10 hover:border-blue-400 transition-colors"
            data-left="85%">
            <div class="w-1.5 h-1.5 bg-blue-500 rounded-full"></div>
          </div>
        </div>

        <span class="text-xs tracking-widest text-blue-400 font-normal drop-shadow-[0_0_5px_rgba(59,130,246,0.4)]">PROCESSED</span>
      </div>
    </div>

  </div>

  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://code.iconify.design/iconify-icon/1.0.7/iconify-icon.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
  <script>
    document.addEventListener("DOMContentLoaded", () => {
            gsap.registerPlugin(ScrollTrigger);
            const tl = gsap.timeline({ defaults: { ease: "power3.out" } });

            // Reveal Application Window
            tl.to("#app-container", {
                duration: 1.2,
                opacity: 1,
                y: 0,
                ease: "expo.out"
            });

            // Reveal Grid Panels sequentially
            tl.from(".panel-section", {
                opacity: 0,
                y: 10,
                duration: 0.8,
                stagger: 0.1
            }, "-=0.6");

            // Animate Horizontal Progress Bars
            document.querySelectorAll('.anim-bar').forEach(bar => {
                const targetW = bar.getAttribute('data-w');
                tl.to(bar, {
                    width: `${targetW}%`,
                    duration: 1.5,
                    ease: "power2.inOut"
                }, "-=0.8");
            });

            // Animate Draggable Thumbs
            document.querySelectorAll('.anim-thumb').forEach(thumb => {
                const targetLeft = thumb.getAttribute('data-left');
                tl.to(thumb, {
                    left: targetLeft,
                    duration: 1.5,
                    ease: "power2.inOut"
                }, "<");
            });

            // Animate Center Circular Ring
            // Target dash offset 691 -> 221
            const mainRing = document.getElementById('main-ring');
            const targetOffset = mainRing.getAttribute('data-target');
            tl.to(mainRing, {
                strokeDashoffset: targetOffset,
                duration: 2,
                ease: "power3.inOut"
            }, "-=1.2");

            // Animate Number Counters
            document.querySelectorAll('.anim-val').forEach(counter => {
                const target = parseInt(counter.getAttribute('data-val'), 10);
                
                gsap.to({ val: 0 }, {
                    val: target,
                    duration: 2,
                    ease: "power2.out",
                    onUpdate: function() {
                        counter.innerText = Math.round(this.targets()[0].val);
                    }
                }, "-=1.5");
            });
        });
  </script>
</section>
