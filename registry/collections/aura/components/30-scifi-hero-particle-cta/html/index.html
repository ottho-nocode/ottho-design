                            <div class="flex gap-1 mt-2">

                                <div class="h-1 flex-1 bg-orange-500/80 rounded-sm"></div>

                    </div>

                    <!-- Environment Status -->

            </div>

            <!-- RIGHT PANEL: Containment Field & CTA -->
            <div class="relative min-h-[500px] lg:min-h-[800px] flex items-center justify-center gs-reveal z-20">

                <!-- Section Frame L-Brackets -->
                <div
                    class="absolute top-0 left-0 w-3 h-3 border-t border-l border-neutral-600/50 pointer-events-none hidden lg:block">
                </div>
                <div
                    class="absolute bottom-0 left-0 w-3 h-3 border-b border-l border-neutral-600/50 pointer-events-none hidden lg:block">
                </div>
                <div
                    class="absolute top-0 right-0 w-3 h-3 border-t border-r border-neutral-600/50 pointer-events-none hidden lg:block">
                </div>
                <div
                    class="absolute bottom-0 right-0 w-3 h-3 border-b border-r border-neutral-600/50 pointer-events-none hidden lg:block">

                <!-- Concentric Framing Rings -->
                <div class="absolute inset-0 flex items-center justify-center pointer-events-none">

                    <!-- Inner Solid Ring -->

                    <!-- Middle Dashed Ring -->

                    <!-- Outer Faint Ring -->

                    <!-- Reticle Marks -->

                    <div
                        class="absolute top-1/2 left-1/2 -translate-x-1/2 translate-y-[160px] sm:translate-y-[180px] w-px h-3 bg-orange-500/50">
                    </div>
                    <div
                        class="absolute top-1/2 left-1/2 -translate-x-[160px] sm:-translate-x-[180px] -translate-y-1/2 h-px w-3 bg-orange-500/50">
                    </div>
                    <div
                        class="absolute top-1/2 left-1/2 translate-x-[160px] sm:translate-x-[180px] -translate-y-1/2 h-px w-3 bg-orange-500/50">
                    </div>
                </div>

                <!-- Ignition CTA Container -->
                <div class="relative group z-30" id="cta-container">
                    <!-- Outer Atmospheric Glow -->
                    <div
                        class="absolute inset-0 bg-orange-500/20 rounded-full blur-xl group-hover:blur-2xl group-hover:bg-orange-500/30 transition-all duration-700 pointer-events-none">
                    </div>

                    <!-- Button Surface -->
                    <button id="ignition-btn" class="relative flex items-center gap-4 px-8 py-5 rounded-sm bg-black border border-orange-500/30 shadow-[inset_0_0_20px_rgba(249,115,22,0.05)] hover:bg-[#0a0500] hover:border-orange-500/80 hover:shadow-[inset_0_0_30px_rgba(249,115,22,0.15)] transition-all duration-700 ease-[cubic-bezier(0.2,0.8,0.2,1)] overflow-hidden cursor-pointer transform group-hover:scale-[1.02] active:scale-[0.98]">

                        <!-- Horizontal Flare -->
                        <div class="absolute top-0 bottom-0 left-0 w-1/2 bg-gradient-to-r from-transparent via-orange-400/10 to-transparent -translate-x-full group-hover:translate-x-[200%] transition-transform duration-[1200ms] ease-in-out pointer-events-none"></div>
                        
                        <!-- Content -->
                        <span class="relative z-10 text-xs font-medium uppercase tracking-[0.2em] text-orange-50 group-hover:text-white transition-colors">Initiate Sequence</span>
                        
                        <div class="relative z-10 flex items-center justify-center w-6 h-6 text-orange-500 group-hover:text-orange-400 transition-colors transform group-hover:rotate-45 group-hover:scale-110 duration-500">

    <style>
        @keyframes pulse {

            0%,
            100% {
                opacity: 1;
                transform: scale(1);
            }

            50% {
                opacity: 0.5;
                transform: scale(0.95);
            }
        }
    </style>

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://code.iconify.design/iconify-icon/1.0.7/iconify-icon.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
    <script>
        // GSAP Scroll Animations
        gsap.registerPlugin(ScrollTrigger);
        
        const tl = gsap.timeline({
            scrollTrigger: {
                trigger: '.gs-container',
                start: 'top 75%',
            }
        });

        tl.fromTo('.gs-reveal', 
            { y: 40, opacity: 0 },
            { y: 0, opacity: 1, duration: 1.2, stagger: 0.15, ease: 'power3.out' }
        );

        // WebGL-style 2D Canvas Particle System
        const canvas = document.getElementById('containment-field');
        const ctx = canvas.getContext('2d');
        const ctaBtn = document.getElementById('ignition-btn');
        
        let width, height;
        let particles = [];
        const particleCount = 350;
        
        // Interaction State
        let targetX = 0;
        let targetY = 0;
        let ctaRect = { left: 0, top: 0, width: 0, height: 0 };
        let state = 'idle'; // idle, hover, burst

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            updateTargetPosition();
        }

        function updateTargetPosition() {
            if (ctaBtn) {
                ctaRect = ctaBtn.getBoundingClientRect();
                targetX = ctaRect.left + ctaRect.width / 2;
                targetY = ctaRect.top + ctaRect.height / 2;
            } else {
                targetX = width * 0.65;
                targetY = height / 2;
            }
        }

        class Particle {
            constructor() {
                this.reset(true);
            }

            reset(initial = false) {
                if (initial) {
                    this.x = Math.random() * width;
                    this.y = Math.random() * height;
                } else {
                    // Spawn at edges or random location
                    this.x = Math.random() > 0.5 ? (Math.random() > 0.5 ? -10 : width + 10) : Math.random() * width;
                    this.y = Math.random() > 0.5 ? (Math.random() > 0.5 ? -10 : height + 10) : Math.random() * height;
                }
                
                this.vx = (Math.random() - 0.5) * 0.5;
                this.vy = (Math.random() - 0.5) * 0.5;
                
                // Noise offset
                this.noiseX = Math.random() * 1000;
                this.noiseY = Math.random() * 1000;
                
                // Appearance
                this.life = Math.random();
                this.decay = Math.random() * 0.005 + 0.002;
                
                // Palette: Orange #f97316 to Amber/Yellow
                const isYellow = Math.random() > 0.8;
                this.r = isYellow ? 251 : 249;
                this.g = isYellow ? 191 : 115;
                this.b = isYellow ? 36 : 22;
                
                this.size = Math.random() * 1.5 + 0.5;
                this.history = [];
            }

            update() {
                const dx = targetX - this.x;
                const dy = targetY - this.y;
                const dist = Math.sqrt(dx * dx + dy * dy);
                
                if (state === 'idle') {
                    // Gentle wandering with weak attraction
                    this.noiseX += 0.01;
                    this.noiseY += 0.01;
                    this.vx += (Math.sin(this.noiseX) * 0.05);
                    this.vy += (Math.cos(this.noiseY) * 0.05);
                    
                    if (dist > 300) {
                        this.vx += (dx / dist) * 0.01;
                        this.vy += (dy / dist) * 0.01;
                    }
                    
                    // Friction
                    this.vx *= 0.98;
                    this.vy *= 0.98;

                } else if (state === 'hover') {
                    // Orbiting and spiraling
                    const force = 0.8;
                    const angle = Math.atan2(dy, dx);
                    
                    // Perpendicular force for orbit + inward force for spiral
                    const orbitX = Math.cos(angle + Math.PI / 2);
                    const orbitY = Math.sin(angle + Math.PI / 2);
                    
                    this.vx += orbitX * force * 0.5 + Math.cos(angle) * force * 0.2;
                    this.vy += orbitY * force * 0.5 + Math.sin(angle) * force * 0.2;
                    
                    this.vx *= 0.92;
                    this.vy *= 0.92;

                } else if (state === 'click') {
                    // High speed burst outward
                    this.vx *= 1.05;
                    this.vy *= 1.05;
                }

                this.x += this.vx;
                this.y += this.vy;

                // Lifecycle
                this.life -= this.decay;
                if (this.life <= 0 || 
                    this.x < -100 || this.x > width + 100 || 
                    this.y < -100 || this.y > height + 100) {
                    if (state !== 'bursting') this.reset();
                }

                // Trails
                this.history.push({x: this.x, y: this.y});
                if (this.history.length > 5) {
                    this.history.shift();
                }
            }

            draw() {
                if (this.history.length < 2) return;
                
                ctx.beginPath();
                ctx.moveTo(this.history[0].x, this.history[0].y);
                for (let i = 1; i < this.history.length; i++) {
                    ctx.lineTo(this.history[i].x, this.history[i].y);
                }
                
                const opacity = Math.sin(this.life * Math.PI); // Fade in/out
                ctx.strokeStyle = `rgba(${this.r}, ${this.g}, ${this.b}, ${opacity * 0.6})`;
                ctx.lineWidth = this.size;
                ctx.stroke();

                // Leading bright dot
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size * 1.2, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(${this.r}, ${this.g}, ${this.b}, ${opacity})`;
                ctx.fill();
            }
        }

        function initParticles() {
            particles = [];
            for (let i = 0; i < particleCount; i++) {
                particles.push(new Particle(true));
            }
        }

        function render() {
            // Smear effect via low opacity clear (matches #050505 bg)
            ctx.fillStyle = 'rgba(5, 5, 5, 0.3)';
            ctx.fillRect(0, 0, width, height);

            particles.forEach(p => {
                p.update();
                p.draw();
            });

            requestAnimationFrame(render);
        }

        // Event Listeners
        window.addEventListener('resize', resize);
        window.addEventListener('scroll', updateTargetPosition);

        ctaBtn.addEventListener('mouseenter', () => { state = 'hover'; });
        ctaBtn.addEventListener('mouseleave', () => { state = 'idle'; });
        
        ctaBtn.addEventListener('mousedown', () => {
            // Collapse phase
            particles.forEach(p => {
                const dx = targetX - p.x;
                const dy = targetY - p.y;
                p.vx = dx * 0.1;
                p.vy = dy * 0.1;
            });
        });

        ctaBtn.addEventListener('mouseup', () => {
            state = 'click';
            // Burst phase
            particles.forEach(p => {
                const dx = p.x - targetX;
                const dy = p.y - targetY;
                const dist = Math.sqrt(dx * dx + dy * dy) || 1;
                const force = Math.random() * 15 + 5;
                p.vx = (dx / dist) * force;
                p.vy = (dy / dist) * force;
                p.life = 1; // Refresh life for burst
            });
            
            setTimeout(() => {
                if(state === 'click') state = 'idle';
            }, 800);
        });

        // Initialize
        resize();
        initParticles();
        render();

    </script>
</section>
