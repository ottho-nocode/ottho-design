<section class="text-white min-h-screen relative overflow-hidden antialiased selection:bg-purple-500/30"
    style="font-family: 'Inter', sans-serif; background-color: #050505;">
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&family=Playfair+Display:ital@0;1&display=swap"
        rel="stylesheet">
    <style>
        .font-serif-magic {
            font-family: 'Playfair Display', serif;
        }

        .mask-container {
            overflow: hidden;
            display: inline-flex;
            vertical-align: top;
        }

        .reveal-text {
            display: inline-block;
            transform: translateY(110%);
        }
    </style>

    <div id="webgl-container" class="fixed inset-0 z-0 pointer-events-none"></div>

    <main class="relative z-10 min-h-screen flex flex-col items-center justify-center px-4 w-full pointer-events-none">
        <div class="pointer-events-auto cursor-pointer flex items-center gap-2.5 px-3 py-1.5 rounded-full border border-white/10 bg-white/[0.03] backdrop-blur-md mb-8 hover:bg-white/[0.06] transition-colors duration-300 mt-20 sm:mt-0 reveal-fade"
            style="opacity: 0;">
            <span class="w-1.5 h-1.5 rounded-full bg-[#9b66ff] shadow-[0_0_8px_rgba(155,102,255,0.8)]"></span>
            <span class="text-xs font-medium text-gray-200 tracking-wide">New</span>
            <span class="text-xs text-gray-400">Explore the Inspiration gallery</span>
        </div>

        <h1
            class="text-5xl md:text-7xl lg:text-[5.5rem] leading-[1.1] font-medium tracking-tight text-center max-w-4xl text-gray-100 flex flex-wrap justify-center gap-x-3 gap-y-2">
            <span class="mask-container"><span class="reveal-text">The</span></span>
            <span class="mask-container"><span class="reveal-text">Design</span></span>
            <span class="mask-container"><span class="reveal-text">Tool</span></span>
            <span class="w-full hidden md:block h-0"></span>
            <span class="mask-container"><span class="reveal-text">for</span></span>
            <span class="mask-container"><span class="reveal-text">Shader</span></span>
            <span class="mask-container"><span class="reveal-text font-serif-magic tracking-normal text-gray-50 pr-1">Magic</span></span>
        </h1>

        <p
            class="mt-8 text-base md:text-xl text-gray-400 text-center max-w-2xl leading-relaxed flex flex-wrap justify-center gap-x-1.5 gap-y-1">
            <span class="mask-container"><span class="reveal-text">Create</span></span>
            <span class="mask-container"><span class="reveal-text">jaw-dropping</span></span>
            <span class="mask-container"><span class="reveal-text">WebGL</span></span>
            <span class="mask-container"><span class="reveal-text">motion</span></span>
            <span class="mask-container"><span class="reveal-text">and</span></span>
            <span class="mask-container"><span class="reveal-text">interaction</span></span>
            <span class="mask-container"><span class="reveal-text">in</span></span>
            <span class="mask-container"><span class="reveal-text">minutes.</span></span>
        </p>

        <div class="mt-12 reveal-fade" style="opacity: 0;">
            <button class="pointer-events-auto px-8 py-4 bg-gradient-to-r from-[#7c3aed] to-[#8b5cf6] hover:from-[#6d28d9] hover:to-[#7c3aed] rounded-full font-medium text-sm text-white shadow-[0_0_20px_rgba(124,58,237,0.3)] hover:shadow-[0_0_30px_rgba(124,58,237,0.5)] transition-all duration-300">
                Start creating now
            </button>
        </div>
    </main>

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script>
        const container = document.getElementById('webgl-container');
        const scene = new THREE.Scene();
        const camera = new THREE.OrthographicCamera(-1, 1, 1, -1, 0, 1);
        const renderer = new THREE.WebGLRenderer({ antialias: false, alpha: true });
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.setSize(window.innerWidth, window.innerHeight);
        container.appendChild(renderer.domElement);

        const material = new THREE.ShaderMaterial({
            uniforms: { uTime: { value: 0 }, uResolution: { value: new THREE.Vector2(window.innerWidth, window.innerHeight) }, uMouse: { value: new THREE.Vector2(0.5, 0.5) } },
            vertexShader: `varying vec2 vUv; void main() { vUv = uv; gl_Position = vec4(position, 1.0); }`,
            fragmentShader: `
                uniform float uTime; uniform vec2 uResolution; uniform vec2 uMouse; varying vec2 vUv;
                float hash(vec2 p) { return fract(sin(dot(p, vec2(12.9898, 78.233))) * 43758.5453); }
                void main() {
                    vec2 aspect = vec2(uResolution.x / uResolution.y, 1.0);
                    vec2 p = (vUv - 0.5) * aspect;
                    p -= (uMouse * 2.0 - 1.0) * aspect * 0.08 * (1.0 - vUv.y);
                    float dist = length(p - vec2(0.0, -0.4));
                    float angle = atan(p.y + 0.4, p.x);
                    float beams = (sin(angle * 6.0 + uTime * 0.4) * 0.5 + 0.5) * (sin(angle * 12.0 - uTime * 0.6) * 0.5 + 0.5);
                    vec3 color = mix(vec3(0.02, 0.01, 0.05), vec3(0.4, 0.1, 0.8), exp(-dist * 2.5));
                    color = mix(color, vec3(0.9, 0.3, 0.6), exp(-dist * 1.5) * beams);
                    color += (hash(vUv * uTime) - 0.5) * 0.02;
                    gl_FragColor = vec4(color * mix(0.2, 1.0, smoothstep(1.0, 0.3, vUv.y)), 1.0);
                }`
        });

        scene.add(new THREE.Mesh(new THREE.PlaneGeometry(2, 2), material));
        let targetMouse = { x: 0.5, y: 0.5 }, currentMouse = { x: 0.5, y: 0.5 };
        window.addEventListener('mousemove', (e) => { targetMouse.x = e.clientX / window.innerWidth; targetMouse.y = 1.0 - (e.clientY / window.innerHeight); });
        window.addEventListener('resize', () => { renderer.setSize(window.innerWidth, window.innerHeight); material.uniforms.uResolution.value.set(window.innerWidth, window.innerHeight); });

        function animate() {
            currentMouse.x += (targetMouse.x - currentMouse.x) * 0.05;
            currentMouse.y += (targetMouse.y - currentMouse.y) * 0.05;
            material.uniforms.uTime.value += 0.01;
            material.uniforms.uMouse.value.set(currentMouse.x, currentMouse.y);
            renderer.render(scene, camera);
            requestAnimationFrame(animate);
        }
        animate();

        gsap.to(".reveal-text", { y: "0%", duration: 1.2, ease: "power4.out", stagger: 0.04, delay: 0.2 });
        gsap.to(".reveal-fade", { opacity: 1, y: 0, duration: 1, ease: "power3.out", delay: 1, stagger: 0.2, onStart: () => gsap.set(".reveal-fade", { y: 20 }) });
    </script>
</section>
